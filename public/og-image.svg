<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="What The Pill - Identify pills by photo, imprint, or description">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#818CF8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C026D3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pill-g" x1="120" y1="80" x2="420" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="48%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="280" cy="315" rx="220" ry="220" fill="url(#glow)" filter="url(#soft)"/>
  <ellipse cx="980" cy="120" rx="180" ry="180" fill="#818CF8" opacity="0.06" filter="url(#soft)"/>

  <g transform="translate(150, 165) scale(9.5)">
    <g transform="rotate(-35, 16, 16)" stroke="url(#pill-g)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 9 10 H 23 A 6 6 0 1 1 23 22 H 9 A 6 6 0 1 1 9 10 Z" stroke-width="1.25"/>
      <path d="M 3 16 L 16 10 L 29 16 L 16 22 Z" stroke-width="0.75"/>
      <line x1="9" y1="10" x2="23" y2="22" stroke-width="0.75"/>
      <line x1="23" y1="10" x2="9" y2="22" stroke-width="0.75"/>
    </g>
  </g>

  <text x="520" y="250" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.5">
    What The Pill
  </text>
  <text x="520" y="330" fill="#94A3B8" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="500">
    Identify pills by photo, imprint, or description
  </text>
  <text x="520" y="390" fill="#64748B" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="400">
    Check interactions and save your cabinet
  </text>

  <rect x="520" y="440" width="280" height="6" rx="3" fill="url(#pill-g)"/>
</svg>
